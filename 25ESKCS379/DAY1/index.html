<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>College Admission Form</h1>
    <p>Please fill in all the required details.</p>

    <form id="admissionForm">

        <div class="row">
            <div class="input-box">
                <label>First Name</label>
                <input type="text" id="fname" required>
            </div>

            <div class="input-box">
                <label>Last Name</label>
                <input type="text" id="lname" required>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" id="phone" maxlength="10" required>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="input-box">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Course</label>
                <select required>
                    <option value="">Select Course</option>
                    <option>B.Tech</option>
                    <option>BCA</option>
                    <option>BBA</option>
                    <option>B.Sc</option>
                    <option>BA</option>
                </select>
            </div>

            <div class="input-box">
                <label>Category</label>
                <select required>
                    <option value="">Select Category</option>
                    <option>General</option>
                    <option>OBC</option>
                    <option>SC</option>
                    <option>ST</option>
                    <option>EWS</option>
                </select>
            </div>
        </div>

        <div class="input-box">
            <label>Address</label>
            <textarea rows="4" required></textarea>
        </div>

        <div class="row">
            <div class="input-box">
                <label>City</label>
                <input type="text" required>
            </div>

            <div class="input-box">
                <label>State</label>
                <input type="text" required>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>PIN Code</label>
                <input type="text" id="pin" maxlength="6" required>
            </div>

            <div class="input-box">
                <label>Percentage (12th)</label>
                <input type="number" id="marks" min="0" max="100" required>
            </div>
        </div>

        <div class="input-box">
            <label>Upload 12th Marksheet</label>
            <input type="file" required>
        </div>

        <div class="checkbox">
            <input type="checkbox" required>
            I declare that all the information provided is correct.
        </div>

        <button type="submit">Submit Application</button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
